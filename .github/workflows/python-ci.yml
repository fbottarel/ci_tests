name: Python CI
 
on: [push, pull_request]
 
jobs:
  python:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        run: pip install -r python_sandbox/requirements.txt
 
      - name: Test
        run: pytest python_sandbox/tests
 
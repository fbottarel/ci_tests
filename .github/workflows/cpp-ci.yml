name: C++ CI

on: [push, pull_request]

jobs:
  cpp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -B cpp_sandbox/build -S cpp_sandbox

      - name: Build
        run: cmake --build cpp_sandbox/build --parallel

      - name: Test
        run: ctest --test-dir cpp_sandbox/build --output-on-failure

